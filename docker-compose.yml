services:
  postgres:
    image: postgres:16-alpine
    container_name: advance_vision_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: advance_vision
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: advance_vision_adminer
    ports:
      - "8888:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
